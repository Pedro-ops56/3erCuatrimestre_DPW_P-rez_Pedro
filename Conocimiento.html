<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Electrónica Tech</title>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: #0a0f1c;
      color: #e2e8f0;
    }

    header {
      background: linear-gradient(90deg, #00ffcc, #0ea5e9);
      padding: 20px;
      text-align: center;
      color: #001f1f;
      text-shadow: 0 0 10px #00ffcc;
    }

    h1 {
      margin: 0;
    }

    .container {
      padding: 20px;
    }

    .card {
      background: #111827;
      border: 1px solid #00ffcc;
      border-radius: 10px;
      padding: 20px;
      margin: 20px 0;
      box-shadow: 0 0 15px #00ffcc33;
      transition: 0.3s;
    }

    .card:hover {
      transform: scale(1.03);
      box-shadow: 0 0 25px #00ffcc;
    }

    .btn {
      display: inline-block;
      padding: 10px 20px;
      color: #00ffcc;
      border: 1px solid #00ffcc;
      border-radius: 5px;
      text-decoration: none;
      margin-top: 10px;
      transition: 0.3s;
    }

    .btn:hover {
      background: #00ffcc;
      color: #001f1f;
      box-shadow: 0 0 10px #00ffcc;
    }

    footer {
      text-align: center;
      padding: 15px;
      background: #020617;
      font-size: 12px;
      color: #64748b;
    }

  </style>
</head>

<body>

<header>
  <h1>⚡ Electrónica Tech</h1>
  <p>Aprende circuitos, componentes y proyectos</p>
</header>

<div class="container">

  <div class="card">
    <h2>🔌 Resistencias</h2>
    <p>Controlan el paso de la corriente en un circuito.</p>
    <a href="#" class="btn">Ver más</a>
  </div>

  <div class="card">
    <h2>💡 LEDs</h2>
    <p>Dispositivos que emiten luz al pasar corriente.</p>
    <a href="#" class="btn">Explorar</a>
  </div>

  <div class="card">
    <h2>🧪 Proyectos</h2>
    <p>Construye circuitos reales paso a paso.</p>
    <a href="#" class="btn">Comenzar</a>
  </div>

</div>

<footer>
  © 2026 Electrónica Tech
</footer>

</body>
</html>
